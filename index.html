<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importation de Transactions - Portfolio</title>
    <style>
        /* Style Global - Mode Sombre Basique */
        body {
            background-color: #0b0f19;
            color: #f3f4f6;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        /* Interface Style Liquid Glass (Glassmorphism) */
        .glass-container {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            box-sizing: border-box;
        }

        h2 {
            margin-top: 0;
            font-weight: 600;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #9ca3af;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* Input File Masqué et Bouton Personnalisé */
        .file-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }

        .custom-file-btn {
            display: block;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ffffff;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        input[type="file"]:hover + .custom-file-btn {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05);
        }

        /* Zone de Status / Console de Débogage */
        #statusLog {
            margin-top: 15px;
            font-size: 13px;
            padding: 12px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: left;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-line;
            color: #a7f3d0; /* Vert clair par défaut pour le succès */
        }
        
        .error-log {
            color: #fca5a5 !important; /* Rouge si erreur */
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <h2>Importation de transactions</h2>
        <p>Sélectionnez votre fichier exporté au format CSV pour alimenter vos registres PEA et CTO automatiquement.</p>
        
        <div class="file-input-wrapper">
            <input type="file" id="csvFileInput" accept=".csv">
            <div class="custom-file-btn" id="btnText">Choisir un fichier .csv</div>
        </div>

        <div id="statusLog" style="display: none;"></div>
    </div>

    <script>
        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Mise à jour visuelle du bouton
            document.getElementById('btnText').textContent = file.name;
            
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                try {
                    // Lancement du parsing robuste
                    const transactions = parseTransactionCSV(text);
                    
                    if (transactions.length === 0) {
                        throw new Error("Aucune transaction valide trouvée ou en-têtes incorrects.");
                    }

                    // Séparation des données pour vos tableaux spécifiques
                    const peaTransactions = transactions.filter(t => t.accountType === 'PEA');
                    const ctoTransactions = transactions.filter(t => t.accountType === 'DEFAULT'); // DEFAULT correspond au CTO

                    // Affichage du résultat du traitement
                    showStatus(
                        `✅ Importation réussie !\n` +
                        `• Total traité : ${transactions.length} lignes.\n` +
                        `• Compte PEA : ${peaTransactions.length} transactions chargées.\n` +
                        `• Compte CTO : ${ctoTransactions.length} transactions chargées.`, 
                        false
                    );

                    // --- INTEGRATION DANS VOTRE APPLICATION ---
                    // C'est ici que vous connectez les données à vos fonctions globales existantes :
                    // Exemple : 
                    // monApplication.sauvegarderDansLeRegistre(transactions);
                    // monApplication.mettreAJourLesTableauxVisuals();
                    console.log("Données complètes prêtes :", transactions);
                    console.log("Lignes PEA :", peaTransactions);
                    console.log("Lignes CTO :", ctoTransactions);

                } catch (error) {
                    showStatus(`❌ Erreur lors de la lecture : ${error.message}`, true);
                }
            };

            reader.readAsText(file, 'UTF-8');
        });

        /**
         * Analyse le texte brut du CSV en nettoyant les guillemets et en extrayant les types de données
         */
        function parseTransactionCSV(csvText) {
            // Séparation stricte par ligne
            const lines = csvText.split(/\r?\n/);
            if (lines.length < 2) return [];

            // Nettoyage complet de la ligne d'en-tête (on enlève les guillemets résiduels et les espaces)
            const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
            
            const dataResult = [];

            // RegEx puissante pour découper selon les virgules tout en ignorant celles à l'intérieur des guillemets
            // Exemple : "Buy trade FR0011... , quantity: 3" reste un bloc uni.
            const csvFieldRegEx = /"([^"]*)"|([^,]+)/g;

            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue; // Ignore les sauts de ligne vides à la fin du fichier

                const values = [];
                let match;
                
                // On applique la RegEx sur la ligne courante
                while ((match = csvFieldRegEx.exec(line)) !== null) {
                    // match[1] contient le texte si entre guillemets, match[2] si sans guillemets
                    values.push(match[1] !== undefined ? match[1].trim() : match[2].trim());
                }

                // Création d'un dictionnaire temporaire clé-valeur basé sur les Headers originaux
                const rowData = {};
                headers.forEach((header, index) => {
                    rowData[header] = values[index] || "";
                });

                // Normalisation et formatage objet pour l'application
                const transaction = {
                    id: rowData['transaction_id'],
                    datetime: rowData['datetime'],
                    date: rowData['date'],                     // Format texte YYYY-MM-DD
                    accountType: rowData['account_type'],       // "PEA" ou "DEFAULT"
                    category: rowData['category'],             // "TRADING" ou "CASH"
                    type: rowData['type'],                     // "BUY", "SELL", "DIVIDEND", "TRANSFER_IN"...
                    assetClass: rowData['asset_class'],
                    name: rowData['name'],                     // "NVIDIA", "Apple", "PEA S&P 500 EUR (Acc)"
                    symbol: rowData['symbol'],                 // Code ISIN
                    
                    // Conversion numérique sécurisée (si vide ou corrompu, retourne 0)
                    shares: parseFloat(rowData['shares']) || 0,
                    price: parseFloat(rowData['price']) || 0,
                    amount: parseFloat(rowData['amount']) || 0,
                    fee: parseFloat(rowData['fee']) || 0,
                    tax: parseFloat(rowData['tax']) || 0,
                    
                    currency: rowData['currency'],
                    description: rowData['description']
                };

                dataResult.push(transaction);
            }

            return dataResult;
        }

        // Fonction utilitaire pour mettre à jour la console de log sur l'interface
        function showStatus(message, isError) {
            const logDiv = document.getElementById('statusLog');
            logDiv.style.display = 'block';
            logDiv.textContent = message;
            if (isError) {
                logDiv.classList.add('error-log');
            } else {
                logDiv.classList.remove('error-log');
            }
        }
    </script>
</body>
</html>
