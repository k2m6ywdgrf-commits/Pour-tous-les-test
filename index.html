<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mon Assistant Patrimoine Global</title>
<style>
:root { --bg: #000; --glass: rgba(22, 28, 45, 0.65); --text: #f3f4f6; --usa: #0ea5e9; --eu: #10b981; --em: #f59e0b; }
body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
.card { background: var(--glass); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
/* ... (Inclure ici l'intégralité de votre CSS original pour conserver le design) ... */
</style>
</head>
<body>

<div id="app">
    </div>

<script>
/** --- UTILS & SÉCURITÉ (Points 1, 2, 3, 7, 10) --- **/
const $ = (id) => document.getElementById(id);
const num = (v) => Number(v) || 0;
const round2 = (v) => Math.round(v * 100) / 100;

function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

function generateId() { return crypto.randomUUID(); }

/** --- GESTION DONNÉES (Points 4, 8) --- **/
let appData = JSON.parse(localStorage.getItem("patrimoine_multi_v6")) || {
    pea: { historique: [], prix: {usa:0, eu:0, em:0}, cibles: {}, settings: {} },
    cto: { historique: [], cours: {}, settings: { tax_rate: 30 } }
};

function persist() {
    if (!validateData(appData)) return console.error("Données corrompues");
    localStorage.setItem("patrimoine_multi_v6", JSON.stringify(appData));
    updateDashboard();
}

function validateData(data) {
    return (data && typeof data === 'object' && Array.isArray(data.pea.historique) && Array.isArray(data.cto.historique));
}
/** --- LOGIQUE DE CALCUL MUTUALISÉE (Point 6 & 7) --- **/
function getAccountStats(accountType) {
    const hist = appData[accountType].historique;
    let totalInvesti = 0;
    let totalDividendes = 0;
    
    hist.forEach(m => {
        totalInvesti += num(m.total);
        if (m.type === 'Dividende') totalDividendes += num(m.total);
    });
    
    return { totalInvesti, totalDividendes };
}

/** --- GESTION DES MOUVEMENTS (Point 5 & 10) --- **/
function renderHistory(accountType) {
    const container = $(`list-${accountType}`);
    if (!container) return;

    // Tri chronologique : stockage inchangé, affichage inversé pour l'UX
    const items = [...appData[accountType].historique].reverse();
    
    container.innerHTML = items.map(m => `
        <div class="row">
            <span>${escapeHtml(m.actif)}</span>
            <span>${round2(m.total)} €</span>
            <button onclick="deleteMovement('${accountType}', '${m.id}')">🗑️</button>
        </div>
    `).join('');
}

function deleteMovement(account, id) {
    if(!confirm("Supprimer ce mouvement ?")) return;
    appData[account].historique = appData[account].historique.filter(m => m.id !== id);
    persist();
    renderHistory(account);
}

/** --- MISE À JOUR DASHBOARD (Point 3, 8, 9) --- **/
function updateDashboard() {
    const statsPEA = getAccountStats('pea');
    const statsCTO = getAccountStats('cto');
    
    // Mise à jour des widgets avec template literals
    const elPea = $('widget-pea-val');
    if (elPea) elPea.innerHTML = `${round2(statsPEA.totalInvesti)} €`;
    
    const elCto = $('widget-cto-val');
    if (elCto) elCto.innerHTML = `${round2(statsCTO.totalInvesti)} €`;
    
    // Calcul global
    const totalGlobal = statsPEA.totalInvesti + statsCTO.totalInvesti;
    const elGlobal = $('widget-global-val');
    if (elGlobal) elGlobal.innerHTML = `${round2(totalGlobal)} €`;
}
/** --- IMPORT / EXPORT SÉCURISÉ (Point 4) --- **/
function importJSON(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const parsed = JSON.parse(e.target.result);
            if (!validateData(parsed)) {
                alert("Erreur : Le format du fichier est invalide.");
                return;
            }
            appData = parsed;
            persist();
            alert("✅ Données importées avec succès !");
            location.reload();
        } catch(err) {
            alert("Erreur lors de la lecture du fichier.");
        }
    };
    reader.readAsText(file);
}

function exportJSON() {
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData));
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);
    downloadAnchorNode.setAttribute("download", "patrimoine_data.json");
    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();
}

/** --- INITIALISATION (Point 11 & Interface) --- **/
function init() {
    // Remplissage des champs de paramètres avec les données existantes
    const fields = {
        'p_usa': appData.pea.prix.usa,
        'p_eu': appData.pea.prix.eu,
        'p_em': appData.pea.prix.em,
        'budget': appData.pea.settings.budget || '',
        'c_usa': appData.pea.cibles.usa,
        'c_eu': appData.pea.cibles.eu,
        'c_em': appData.pea.cibles.em,
        'alerte_seuil': appData.pea.settings.alerte_seuil || 5,
        'taux_fisc': appData.cto.settings.tax_rate || 30
    };

    for (const [id, value] of Object.entries(fields)) {
        const el = $(id);
        if (el) el.value = value;
    }
    
    updateDashboard();
    renderHistory('pea');
    renderHistory('cto');
}

// Lancement au chargement de la page
window.onload = init;
</script>
</body>
</html>
