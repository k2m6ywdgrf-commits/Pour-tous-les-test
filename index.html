<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ma Station Météo</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Météo Perso">
    
    <style>
        :root {
            --bg-color: #1c1c1e;
            --card-bg: #2c2c2e;
            --text-color: #ffffff;
            --text-secondary: #aeaeb2;
            --accent-color: #0a84ff;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 5px;
        }

        .update-time {
            font-size: 12px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 25px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 14px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card-full {
            grid-column: span 2;
        }

        .card-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 28px;
            font-weight: 600;
        }

        .btn-refresh {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-refresh:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="station-name">Ma Station</h1>
        <div class="update-time" id="time">-</div>

        <div class="grid" id="weather-grid">
            <p style="grid-column: span 2; text-align: center;">Chargement des données...</p>
        </div>

        <button class="btn-refresh" onclick="fetchMeteo()">Actualiser</button>
    </div>

    <script>
        // CONFIGURATION - Remplissez avec vos propres informations Ecowitt
        const APP_KEY = "VOTRE_APPLICATION_KEY"; 
        const API_KEY = "VOTRE_API_KEY";         
        const MAC = "VOTRE_ADRESSE_MAC";             

        async function fetchMeteo() {
            // L'URL force le système métrique (temp_unitid=1 pour Celsius, wind_speed_unitid=7 pour km/h)
            const url = `https://api.ecowitt.net/api/v3/device/real_time?application_key=${APP_KEY}&api_key=${API_KEY}&mac=${MAC}&call_back=all&temp_unitid=1&wind_speed_unitid=7&rainfall_unitid=12&pressure_unitid=3`;
            
            try {
                const response = await fetch(url);
                const json = await response.json();
                
                if (json.code === 0 && json.data) {
                    displayData(json.data);
                } else {
                    document.getElementById('weather-grid').innerHTML = `<p style="grid-column: span 2; color:#ff453a; text-align:center;">Erreur Ecowitt : ${json.msg}</p>`;
                }
            } catch (error) {
                document.getElementById('weather-grid').innerHTML = `<p style="grid-column: span 2; color:#ff453a; text-align:center;">Erreur de connexion internet</p>`;
            }
        }

        function displayData(data) {
            let gridHtml = "";
            
            // Extraction sécurisée des données selon la structure de l'API v3 Ecowitt
            if (data.outdoor && data.outdoor.temperature) {
                gridHtml += createCard("Temp. Extérieure", `${data.outdoor.temperature.value} °C`);
            }
            if (data.outdoor && data.outdoor.humidity) {
                gridHtml += createCard("Humidité Ext.", `${data.outdoor.humidity.value} %`);
            }
            if (data.wind && data.wind.wind_speed) {
                gridHtml += createCard("Vent", `${data.wind.wind_speed.value} km/h`);
            }
            if (data.rainfall && data.rainfall.hourly) {
                gridHtml += createCard("Pluie (Heure)", `${data.rainfall.hourly.value} mm`);
            }
            if (data.pressure && data.pressure.relative) {
                gridHtml += createCard("Pression", `${data.pressure.relative.value} hPa`, true);
            }

            document.getElementById('weather-grid').innerHTML = gridHtml;
            
            // Mise à jour de l'heure de relevé
            const date = new Date();
            document.getElementById('time').innerText = `Dernière mise à jour : ${date.toLocaleTimeString('fr-FR')}`;
        }

        function createCard(title, value, isFullWidth = false) {
            return `
                <div class="card ${isFullWidth ? 'card-full' : ''}">
                    <div class="card-title">${title}</div>
                    <div class="card-value">${value}</div>
                </div>
            `;
        }

        // Chargement automatique à l'ouverture
        fetchMeteo();
    </script>
</body>
</html>
